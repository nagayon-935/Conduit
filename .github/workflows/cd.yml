name: CD

# CI が main ブランチで成功した後にのみ実行
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

# 同時デプロイを防ぐ（前のジョブが完了するまで待機）
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ── CI 通過チェック ─────────────────────────────────────────────────────
  check-ci:
    name: CI passed?
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding with deployment."

  # ── バックエンド Docker イメージ: ビルド & GHCR プッシュ ──────────────
  build-backend:
    name: Build & push backend image
    runs-on: ubuntu-latest
    needs: check-ci
    permissions:
      contents: read
      packages: write
    outputs:
      sha-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── フロントエンド: ビルド & アーティファクト保存 ──────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: check-ci
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── 本番サーバーへデプロイ ─────────────────────────────────────────────
  # 有効にするには GitHub の Environment "production" を作成し、
  # 以下の Secrets / Variables を設定してください:
  #   Secrets:
  #     SSH_HOST     — デプロイ先サーバーのホスト名 or IP
  #     SSH_USER     — SSH ユーザー名
  #     SSH_KEY      — SSH 秘密鍵 (PEM 形式)
  #     DEPLOY_DIR   — サーバー上のデプロイディレクトリ (例: /opt/conduit)
  #   Variables:
  #     DEPLOY_ENABLED — 'true' に設定するとデプロイが実行される
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: vars.DEPLOY_ENABLED == 'true'
    environment: production
    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      # フロントエンドを本番サーバーへ転送
      - name: Copy frontend dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "frontend-dist/"
          target: "${{ secrets.DEPLOY_DIR }}/frontend/dist"
          strip_components: 1

      # GHCR イメージを pull して docker compose 再起動
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_DIR }}"

            # GHCR ログイン
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 最新イメージを取得
            docker pull ghcr.io/${{ github.repository }}/backend:latest

            # docker-compose.ghcr.yml オーバーライドで GHCR イメージを使用して起動
            docker compose \
              -f docker-compose.prod.yml \
              -f docker-compose.ghcr.yml \
              up -d --no-build backend

            # nginx を再起動してフロントエンドを反映
            docker compose -f docker-compose.prod.yml restart nginx

            # 古いイメージを削除
            docker image prune -f
