name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ── バックエンド Docker イメージ: ビルド & GHCR プッシュ ──────────────
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Go バイナリ: linux/amd64 & linux/arm64 ────────────────────────────
  binaries:
    name: Build binary (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o conduit-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conduit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: conduit-${{ matrix.goos }}-${{ matrix.goarch }}

  # ── フロントエンド: ビルド & アーティファクト保存 ──────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Archive frontend dist
        run: |
          cd ..
          tar -czf frontend-dist.tar.gz frontend/dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz

  # ── GitHub Release 作成 ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, binaries, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker イメージ

            ```bash
            docker pull ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
            ```

            `docker-compose.ghcr.yml` で使用する場合:

            ```bash
            BACKEND_IMAGE=ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }} \
              docker compose -f docker-compose.prod.yml -f docker-compose.ghcr.yml up -d
            ```

            ## バイナリ

            | ファイル | プラットフォーム |
            |---------|----------------|
            | `conduit-linux-amd64` | Linux x86_64 |
            | `conduit-linux-arm64` | Linux ARM64 |

            デプロイ手順は [DEPLOY.md](https://github.com/${{ github.repository }}/blob/main/DEPLOY.md) を参照してください。
          files: |
            artifacts/conduit-linux-amd64/conduit-linux-amd64
            artifacts/conduit-linux-arm64/conduit-linux-arm64
            artifacts/frontend-dist/frontend-dist.tar.gz
